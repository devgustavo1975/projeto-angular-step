<!-- app.component.html -->
<form [formGroup]="loginForm" (ngSubmit)="enviar()">
  <input type="email" formControlName="email" placeholder="E-mail" />
  <input type="password" formControlName="passwordHash" placeholder="Senha" />
  <input type="text" formControlName="roles" placeholder="Funções" />
  <input type="text" formControlName="firstName" placeholder="Nome" />
  <input type="text" formControlName="lastName" placeholder="Sobrenome" />
  <input type="text" formControlName="telephone" placeholder="Telefone" />
  <button type="submit">Entrar</button>
</form>

<p *ngIf="loginForm.get('email')?.invalid">
  E-mail inválido
</p>
